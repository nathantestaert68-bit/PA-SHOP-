function t(key) {
  const d = langData[state.lang];

  for (const k of keys) v = v[k];
  if (typeof v === 'function') return v;
  return v;
}

function formatPrice(amount, currency) {
  if (currency === 'EUR') return amount.toFixed(2).replace('.', ',') + '€';
  return '$' + amount.toFixed(2);
}

                  <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
                  Discord
                </a>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function createCheckout() {
  const total = state.cart.reduce((s, i) => s + i.price, 0);
  const c = state.currency;
  const section = document.createElement('section');
  section.className = 'sub-page';
  section.innerHTML = `
    <div class="sub-box">
      <button class="back-btn" id="checkoutBack"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg> ${t('back')}</button>
      <div class="sub-title">${t('summary')}</div>
      <div class="sub-items">
        ${state.cart.map((item, i) => `
          <div class="sub-item"><span>${item.label}</span><span>${formatPrice(item.price, c === 'EUR' ? 'EUR' : 'USD')}</span></div>
        `).join('')}
        <div class="sub-item total-line"><span>${t('cartTotal')}</span><span>${formatPrice(total, c === 'EUR' ? 'EUR' : 'USD')}</span></div>
      </div>
      <div class="discord-input-wrap">
        <label class="discord-input-label">${t('discordLabelF')}</label>
        <input class="discord-input" id="discordInput" placeholder="${t('discordPh')}">
      </div>
      <div class="discord-input-wrap">
        <label class="discord-input-label">${t('emailLabel')}</label>
        <input class="discord-input" id="emailInput" placeholder="${t('emailPh')}" type="email">
      </div>
      <div class="payment-label">${t('payMethod')}</div>
      <div class="payment-methods">
        <button class="method-btn selected" data-method="paypal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M7.076 21.337H2.47a.641.641 0 0 1-.633-.74L4.944.901C5.026.382 5.474 0 5.998 0h7.46c2.57 0 4.578.543 5.69 1.81 1.01 1.15 1.304 2.42 1.012 4.287-.023.143-.047.288-.077.437-.983 5.05-4.349 6.797-8.647 6.797h-2.19c-.524 0-.968.382-1.05.9l-1.12 7.106z"/></svg>
          PayPal
        </button>
        <button class="method-btn" data-method="crypto">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M9 9h6M9 15h6" stroke="#000" stroke-width="2" fill="none"/></svg>
          ${t('crypto')}
        </button>
      </div>
      <div class="paypal-info" id="paypalInfo">
        <div class="paypal-info-title">${state.lang === 'FR' ? 'Paiement PayPal' : 'PayPal Payment'}</div>
        <div class="paypal-info-row"><span class="paypal-info-label">${state.lang === 'FR' ? 'Email' : 'Email'}</span><span class="paypal-info-value">alexuchiwa23@gmail.com</span></div>
        <div class="paypal-info-row"><span class="paypal-info-label">${state.lang === 'FR' ? 'Montant' : 'Amount'}</span><span class="paypal-info-value" id="paypalAmount">${formatPrice(total, c === 'EUR' ? 'EUR' : 'USD')}</span></div>
        <div class="paypal-info-note">${state.lang === 'FR' ? 'Envoie en ami proche (Friends & Family) ⚠️' : 'Send as Friends & Family ⚠️'}</div>
      </div>
      <button class="checkout-btn" id="checkoutBtn" onclick="window.open('https://discord.gg/5s8BAxPhA5','_blank')">${state.lang === 'FR' ? 'OUVRIR UN TICKET DISCORD' : 'OPEN A DISCORD TICKET'}</button>
      <div class="sub-after">
        ${state.lang === 'FR' ? 'Envoie en ami proche (Friends & Family). Après paiement, tu recevras une confirmation sur Discord.' : 'Send as Friends & Family. After payment, you will receive confirmation on Discord.'}
      </div>
    </div>`;
  
  section.querySelector('#checkoutBack').onclick = () => { state.page = 'category'; render(); };
  section.querySelectorAll('[data-method]').forEach(el => {
    el.onclick = () => {
      section.querySelectorAll('[data-method]').forEach(b => b.classList.remove('selected'));
      el.classList.add('selected');
      const info = section.querySelector('#paypalInfo');
      if (info) {
        info.style.display = el.dataset.method === 'paypal' ? 'block' : 'none';
      }
      const btn = section.querySelector('#checkoutBtn');
      if (el.dataset.method === 'paypal') {
        btn.textContent = state.lang === 'FR' ? 'COMMANDER' : 'ORDER';
      } else {
        btn.textContent = t('proofConfirm');
      }
    };
  });
  return section;
}

function createDrawerOverlay() {
  const div = document.createElement('div');
  div.className = 'drawer-overlay';
  div.onclick = () => { state.cartOpen = false; render(); };
  return div;
}

function createCartDrawer() {
  const div = document.createElement('div');
  div.className = 'cart-drawer open';
  const total = state.cart.reduce((s, i) => s + i.price, 0);
  const c = state.currency;
  div.innerHTML = `
    <div class="cart-header">
      <div class="cart-title">${t('cartTitle')} ${state.cart.length ? `<span class="cart-count">${state.cart.length}</span>` : ''}</div>
      <button class="cart-close" id="cartClose">✕</button>
    </div>
    ${state.cart.length === 0 ? `<div class="cart-empty">${t('cartEmpty')}</div>` : `
      <div class="cart-items">
        ${state.cart.map((item, i) => `
          <div class="cart-item">
            <div><div class="cart-item-title">${item.label}</div><div class="cart-item-price">${formatPrice(item.price, c === 'EUR' ? 'EUR' : 'USD')}</div></div>
            <button class="cart-item-remove" data-remove="${i}">✕</button>
          </div>`).join('')}
      </div>
      <div class="cart-footer">
        <div class="cart-total"><span>${t('cartTotal')}</span><span>${formatPrice(total, c === 'EUR' ? 'EUR' : 'USD')}</span></div>
        <button class="checkout-btn" id="goCheckout">${t('checkoutCart')}</button>
      </div>`}`;

  div.querySelector('#cartClose').onclick = () => { state.cartOpen = false; render(); };
  const goBtn = div.querySelector('#goCheckout');
  if (goBtn) goBtn.onclick = () => { window.open('https://discord.gg/5s8BAxPhA5', '_blank'); };
  div.querySelectorAll('[data-remove]').forEach(el => {
    el.onclick = () => {
      state.cart.splice(parseInt(el.dataset.remove), 1);
      render();
    };
  });
  return div;
}

function createFooter() {
  const footer = document.createElement('footer');
  footer.className = 'footer';
  footer.innerHTML = `
    <div class="footer-brand"><span>${t('footerBrand')}</span></div>
    <div class="footer-links">
      ${t('footerLinks').map((l, i) => {
        const actions = [
          () => { state.page = 'categories'; render(); },
          () => window.open('https://discord.gg/5s8BAxPhA5', '_blank')
        ];
        return `<a data-flink="${i}">${l}</a>`;
      }).join('')}
    </div>
    <div class="footer-copy">© ${new Date().getFullYear()} PA SHOP. ${t('footerRights')}</div>`;
  footer.querySelectorAll('[data-flink]').forEach(el => {
    const i = parseInt(el.dataset.flink);
    const actions = [
      () => { state.page = 'categories'; render(); },
      () => window.open('https://discord.gg/5s8BAxPhA5', '_blank')
    ];
    el.onclick = actions[i];
  });
  return footer;
}

// Event delegation for dynamic content
document.addEventListener('click', function(e) {
  const hpCard = e.target.closest('.hp-card');
  if (hpCard && !e.target.closest('button')) {
    state.page = 'category';
    state.category = hpCard.dataset.hpcat;
    render();
    return;
  }
  const hpBtn = e.target.closest('.hp-card-btn');
  if (hpBtn) {
    window.open('https://discord.gg/5s8BAxPhA5', '_blank');
    return;
  }
  const addBtn = e.target.closest('[data-add]');
  if (addBtn) {
    const id = addBtn.dataset.add;
    const price = parseFloat(addBtn.dataset.price);
    const label = addBtn.dataset.label || id;
    if (!isNaN(price)) {
      state.cart.push({ id, label, price, currency: state.currency });
      addBtn.textContent = t('added');
      addBtn.classList.add('btn-added');
      setTimeout(() => { 
        if (addBtn) {
          addBtn.textContent = t('add');
          addBtn.classList.remove('btn-added');
        }
      }, 1200);
    }
    return;
  }
});

// Spotlights
document.addEventListener('mousemove', function(e) {
  document.querySelectorAll('[data-spotlight]').forEach(el => {
    const r = el.getBoundingClientRect();
    const mx = ((e.clientX - r.left) / r.width) * 100;
    const my = ((e.clientY - r.top) / r.height) * 100;
    el.style.setProperty('--mx', mx + '%');
    el.style.setProperty('--my', my + '%');
  });
});

render();
</script>
</body>
</html>
